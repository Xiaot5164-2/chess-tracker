# 一键本地全栈（MySQL + Worker + Next）：
#   docker compose up -d --build
# 浏览器 http://localhost:3000 · MySQL 宿主机 3306（chess/chess，库 chess_tracker）
#
# 仅 Worker、连接外部库（无容器 MySQL）：
#   docker compose -f docker-compose.worker.yml up -d --build
#
# Worker 的环境变量以下方 environment 为准（勿依赖本机必须存在 backend-go/.env，便于 GCE/CI）。

services:
  mysql:
    image: mysql:8.4
    container_name: chess-tracker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chess_tracker
      MYSQL_USER: chess
      MYSQL_PASSWORD: chess
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: chess-tracker-web
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://chess:chess@mysql:3306/chess_tracker
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: chess-tracker-worker
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      POLL_INTERVAL: ${POLL_INTERVAL:-1h}
      PUZZLE_SYNC_INTERVAL: ${PUZZLE_SYNC_INTERVAL:-10m}
      PUZZLE_HTTP_TIMEOUT: ${PUZZLE_HTTP_TIMEOUT:-12s}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      RUN_ONCE: ${RUN_ONCE:-}
      GAMES_SYNC_INTERVAL: ${GAMES_SYNC_INTERVAL:-10m}
      GAMES_INCREMENTAL_DAYS: ${GAMES_INCREMENTAL_DAYS:-2}
      DAILY_GAME_STATS_LOOKBACK_DAYS: ${DAILY_GAME_STATS_LOOKBACK_DAYS:-120}
      DATABASE_URL: mysql://chess:chess@mysql:3306/chess_tracker
      SYNC_GAMES: "1"

volumes:
  mysql_data:
