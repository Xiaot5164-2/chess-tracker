# 仅 Go Worker，连接外部 MySQL。
# DATABASE_URL：写在仓库根目录 .env（与 docker-compose 同级），或导出环境变量后再 up。
#   docker compose -f docker-compose.worker.yml up -d --build

services:
  worker:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: chess-tracker-worker
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      POLL_INTERVAL: ${POLL_INTERVAL:-1h}
      PUZZLE_SYNC_INTERVAL: ${PUZZLE_SYNC_INTERVAL:-10m}
      PUZZLE_HTTP_TIMEOUT: ${PUZZLE_HTTP_TIMEOUT:-12s}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      RUN_ONCE: ${RUN_ONCE:-}
      GAMES_SYNC_INTERVAL: ${GAMES_SYNC_INTERVAL:-10m}
      GAMES_INCREMENTAL_DAYS: ${GAMES_INCREMENTAL_DAYS:-2}
      DAILY_GAME_STATS_LOOKBACK_DAYS: ${DAILY_GAME_STATS_LOOKBACK_DAYS:-120}
      DATABASE_URL: ${DATABASE_URL}
